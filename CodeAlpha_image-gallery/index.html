<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <h1>Image Gallery</h1>
        </div>
    </header>
    <div class="full-img" id="fullImgBox">
        <img src="images/img4.avif" alt="" id="fullImg">
        <span onclick="closeFullImg()">X</span>
    </div>
    <div class="img-gallery">
        <img src="https://plus.unsplash.com/premium_photo-1773833959904-e34b101496e2?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxMXx8fGVufDB8fHx8fA%3D%3D"
            onclick="openFullImg(this.src)" alt="">
        <img src="https://plus.unsplash.com/premium_photo-1773506329571-1c43ae68cc44?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxNnx8fGVufDB8fHx8fA%3D%3D"
            onclick="openFullImg(this.src)" alt="">
        <img src="images/img3.avif" onclick="openFullImg(this.src)" alt="">
        <img src="images/img4.avif" onclick="openFullImg(this.src)" alt="">
        <img src="images/img5.avif" onclick="openFullImg(this.src)" alt="">
        <img src="https://images.unsplash.com/photo-1761839259488-2bdeeae794f5?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwyOXx8fGVufDB8fHx8fA%3D%3D"
            onclick="openFullImg(this.src)" alt="">
        <img src="https://plus.unsplash.com/premium_photo-1773833404629-6b3b5465d9c4?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwzMHx8fGVufDB8fHx8fA%3D%3D"
            onclick="openFullImg(this.src)" alt="">
        <img src="images/img8.avif" onclick="openFullImg(this.src)" alt="">
        <img src="https://plus.unsplash.com/premium_photo-1733760125440-e20199e6dc11?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw0NXx8fGVufDB8fHx8fA%3D%3D"
            onclick="openFullImg(this.src)" alt="">
        <img src="images/img5.avif" onclick="openFullImg(this.src)" alt="">
        <img src="https://images.unsplash.com/photo-1773402208827-97c7cc7d4246?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxMjZ8fHxlbnwwfHx8fHw%3D"
            onclick="openFullImg(this.src)" alt="">
        <img src="https://plus.unsplash.com/premium_photo-1755618594548-fd3eb142deee?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxMTV8fHxlbnwwfHx8fHw%3D"
            onclick="openFullImg(this.src)" alt="">
    </div>

    <script>
        var fullImgBox = document.getElementById("fullImgBox");
        var fullImg = document.getElementById("fullImg");

        function openFullImg(pic) {
            fullImgBox.style.display = "flex";
            fullImg.src = pic;
        };

        function closeFullImg(pic) {
            fullImgBox.style.display = "none";
        };
    </script>
</body>

</html>
